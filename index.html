<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HelloCity — Miami Insider Onboarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #FFB800;
      --orange-light: #FFC107;
      --bg: #FAF7F4;
      --bg2: #F0EBE4;
      --white: #FFFFFF;
      --text: #1A1A2E;
      --text-muted: #888;
      --border: #E8E0D8;
      --shadow: 0 2px 12px rgba(0,0,0,0.07);
    }
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
    }
    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    /* ── Header ── */
    header {
      background: var(--white);
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      z-index: 10;
    }
    .logo-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-top: 1px; }
    .progress-dots { margin-left: auto; display: flex; gap: 6px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--border);
      transition: background 0.35s, transform 0.2s;
    }
    .dot.filled { background: var(--orange); transform: scale(1.1); }

    /* ── Progress bar ── */
    .progress-bar { height: 3px; background: var(--border); flex-shrink: 0; }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--orange-light));
      border-radius: 0 2px 2px 0;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg-row {
      display: flex;
      animation: slideUp 0.25s ease;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .avatar {
      width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; margin-right: 8px; margin-top: 2px; align-self: flex-end;
    }
    .bubble {
      max-width: 78%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      box-shadow: var(--shadow);
    }
    .bubble.user {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #1A1A2E;
      border-radius: 18px 18px 4px 18px;
      box-shadow: none;
      font-weight: 500;
    }
    .bubble.assistant {
      background: var(--white);
      border-radius: 18px 18px 18px 4px;
    }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; gap: 8px; animation: fadeIn 0.2s; }
    .typing-bubble {
      background: var(--white); border-radius: 18px 18px 18px 4px;
      padding: 12px 16px; display: flex; gap: 5px; align-items: center;
      box-shadow: var(--shadow);
    }
    .dot-pulse {
      width: 7px; height: 7px; border-radius: 50%; background: var(--orange);
      animation: pulse 1.2s infinite;
    }
    .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.4s; }

    /* ── Venue cards ── */
    .venues-section { animation: slideUp 0.3s ease; }
    .venues-label {
      font-size: 11px; font-weight: 600; color: var(--orange);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 10px; padding-left: 36px;
    }
    .venue-card {
      background: var(--white);
      border-radius: 14px;
      padding: 13px 15px;
      margin-bottom: 9px;
      box-shadow: var(--shadow);
      border-left: 3px solid var(--orange);
      animation: slideUp 0.3s ease both;
    }
    .venue-img {
      width: 100%; height: 140px; object-fit: cover;
      border-radius: 10px; margin-bottom: 10px;
      display: block;
    }
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .venue-name {
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px;
      color: var(--text); flex: 1;
    }
    .venue-vibe {
      font-size: 10px; font-weight: 600; color: var(--orange);
      background: #FFF0ED; border-radius: 20px;
      padding: 2px 8px; white-space: nowrap; margin-left: 8px; flex-shrink: 0;
    }
    .venue-meta { font-size: 11px; color: var(--text-muted); font-weight: 500; margin-bottom: 5px; }
    .venue-desc { font-size: 13px; color: #555; line-height: 1.5; }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 10px; margin-top: 6px; }
    .btn-yes {
      flex: 1; padding: 13px;
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #1A1A2E; border: none; border-radius: 14px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Syne', sans-serif;
      box-shadow: 0 4px 14px rgba(255,184,0,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-yes:active { transform: scale(0.96); box-shadow: 0 2px 8px rgba(255,92,57,0.2); }
    .btn-no {
      padding: 13px 18px;
      background: var(--white); color: #777;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: transform 0.15s;
    }
    .btn-no:active { transform: scale(0.96); }

    /* ── Profile card ── */
    .profile-card {
      background: var(--white); border-radius: 20px; padding: 22px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      animation: slideUp 0.4s ease;
    }
    .profile-header { text-align: center; margin-bottom: 18px; }
    .profile-palm { font-size: 38px; margin-bottom: 8px; }
    .profile-title {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px;
      color: var(--text); margin-bottom: 3px;
    }
    .profile-subtitle { font-size: 12px; color: var(--text-muted); }
    .profile-json {
      background: #FFF8F6; border-radius: 12px; padding: 14px;
      font-family: 'DM Mono', monospace; font-size: 13px;
      color: #444; line-height: 1.7; white-space: pre-wrap; margin-bottom: 14px;
    }
    .interest-pills { display: flex; gap: 8px; margin-bottom: 16px; }
    .interest-pill {
      flex: 1; background: linear-gradient(135deg, var(--orange), var(--orange-light));
      border-radius: 10px; padding: 9px 6px;
      text-align: center; font-size: 11px; color: #1A1A2E;
      font-weight: 700; line-height: 1.3;
    }
    .btn-restart {
      width: 100%; padding: 13px;
      background: var(--text); color: white;
      border: none; border-radius: 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: 'Syne', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-restart:active { opacity: 0.85; }

    /* ── Input bar ── */
    #input-bar {
      padding: 11px 14px 20px;
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: var(--bg2); border-radius: 22px;
      padding: 10px 16px; display: flex; align-items: center;
    }
    #msg-input {
      flex: 1; border: none; background: transparent;
      font-size: 15px; outline: none; color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }
    #msg-input::placeholder { color: #bbb; }
    #send-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      background: var(--border); color: #aaa;
      transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    #send-btn.active {
      background: linear-gradient(135deg, var(--orange), var(--orange-light));
      color: #1A1A2E;
      box-shadow: 0 4px 12px rgba(255,184,0,0.4);
    }
    #send-btn:active { transform: scale(0.9); }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.35; transform: scale(0.75); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="logo-icon">🌴</div>
    <div>
      <div class="logo-text">HelloCity</div>
      <div class="logo-sub">Miami Insider Onboarding</div>
    </div>
    <div class="progress-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
  </header>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input bar -->
  <div id="input-bar">
    <div class="input-wrap">
      <input id="msg-input" type="text" placeholder="Tell me what you love..." autocomplete="off" />
    </div>
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  // ─── Config ───────────────────────────────────────────────────────────────
  // Change this to your deployed backend URL
  const API_BASE = window.BACKEND_URL || "http://localhost:3001";

  // ─── State ────────────────────────────────────────────────────────────────
  let sessionId = null;
  let phase = "chat"; // "chat" | "confirm" | "done"
  let interestCount = 0;
  let loading = false;

  // ─── DOM refs ─────────────────────────────────────────────────────────────
  const chat = document.getElementById("chat");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const progressFill = document.getElementById("progress-fill");

  // ─── Init ─────────────────────────────────────────────────────────────────
  init();

  async function init() {
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/session`, { method: "POST" });
      const data = await res.json();
      sessionId = data.sessionId;
      updateState(data.state);
      appendMessage("assistant", data.message);
    } catch (e) {
      appendMessage("assistant", "⚠️ Could not connect to HelloCity backend. Make sure the server is running.");
    }
    setLoading(false);
    input.focus();
  }

  // ─── Send message ─────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading || phase !== "chat") return;
    input.value = "";
    updateSendBtn();

    appendMessage("user", text);
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message: text }),
      });
      const data = await res.json();
      updateState(data.state);
      appendMessage("assistant", data.message);

      if (data.pendingInterest && data.venues) {
        showVenues(data.pendingInterest, data.venues);
      }
    } catch (e) {
      appendMessage("assistant", "Hmm, something went wrong. Try again!");
    }

    setLoading(false);
    if (phase === "chat") input.focus();
  }

  // ─── Confirm interest ─────────────────────────────────────────────────────
  async function confirmInterest(confirmed) {
    // Remove venue section
    const venueSection = document.getElementById("venue-section");
    if (venueSection) venueSection.remove();

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, confirmed }),
      });
      const data = await res.json();
      updateState(data.state);

      if (data.state.complete) {
        appendMessage("assistant", data.message);
        showProfile(data.profile);
      } else {
        appendMessage("assistant", data.message);
      }
    } catch (e) {
      appendMessage("assistant", "Something went wrong. Let's keep going!");
    }

    setLoading(false);
    if (phase === "chat") input.focus();
  }

  // ─── UI helpers ───────────────────────────────────────────────────────────
  function appendMessage(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    if (role === "assistant") {
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "🤖";
      row.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollChat();
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-bubble">
        <span class="dot-pulse"></span>
        <span class="dot-pulse"></span>
        <span class="dot-pulse"></span>
      </div>`;
    chat.appendChild(row);
    scrollChat();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function showVenues(interest, venues) {
    phase = "confirm";
    updateInputState();

    const section = document.createElement("div");
    section.className = "venues-section";
    section.id = "venue-section";

    const label = document.createElement("div");
    label.className = "venues-label";
    label.textContent = `✨ Miami picks for "${interest}"`;
    section.appendChild(label);

    venues.forEach((v, i) => {
      const card = document.createElement("div");
      card.className = "venue-card";
      card.style.animationDelay = `${i * 0.1}s`;
      card.innerHTML = `
        ${v.imageUrl ? `<img src="${v.imageUrl}" alt="${v.name}" class="venue-img" onerror="this.style.display='none'" />` : ""}
        <div class="venue-header">
          <div class="venue-name">${v.emoji} ${v.name}</div>
          <div class="venue-vibe">${v.vibe}</div>
        </div>
        <div class="venue-meta">📍 ${v.neighborhood} · ${v.hours}</div>
        <div class="venue-desc">${v.description}</div>`;
      section.appendChild(card);
    });

    const actions = document.createElement("div");
    actions.className = "action-row";
    actions.innerHTML = `
      <button class="btn-yes" onclick="confirmInterest(true)">✓ Yes, that's what I meant</button>
      <button class="btn-no" onclick="confirmInterest(false)">No</button>`;
    section.appendChild(actions);

    chat.appendChild(section);
    scrollChat();
  }

  function showProfile(profile) {
    phase = "done";
    updateInputState();

    const card = document.createElement("div");
    card.className = "profile-card";
    card.innerHTML = `
      <div class="profile-header">
        <div class="profile-palm">🌴</div>
        <div class="profile-title">Your Miami Profile</div>
        <div class="profile-subtitle">Personalized just for you</div>
      </div>
      <div class="profile-json">${JSON.stringify(profile, null, 2)}</div>
      <div class="interest-pills">
        ${profile.interests.map(i => `<div class="interest-pill">${i}</div>`).join("")}
      </div>
      <button class="btn-restart" onclick="restart()">Start Over</button>`;

    chat.appendChild(card);
    scrollChat();

    // Hide input bar
    document.getElementById("input-bar").style.display = "none";
  }

  function updateState(state) {
    if (!state) return;
    interestCount = state.interestCount;
    if (state.phase) phase = state.phase;

    // Dots
    for (let i = 0; i < 3; i++) {
      document.getElementById(`d${i}`).classList.toggle("filled", i < interestCount);
    }
    // Progress bar
    progressFill.style.width = `${(interestCount / 3) * 100}%`;

    updateInputState();
  }

  function updateInputState() {
    const disabled = loading || phase !== "chat";
    input.disabled = disabled;
    input.placeholder = phase === "confirm"
      ? "Tap a button above..."
      : phase === "done"
      ? ""
      : "Tell me what you love...";
    updateSendBtn();
  }

  function setLoading(val) {
    loading = val;
    if (val) showTyping(); else removeTyping();
    updateInputState();
  }

  function updateSendBtn() {
    const active = !loading && input.value.trim() && phase === "chat";
    sendBtn.classList.toggle("active", active);
    sendBtn.disabled = !active;
  }

  function scrollChat() {
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
  }

  function restart() {
    location.reload();
  }

  // ─── Event listeners ──────────────────────────────────────────────────────
  input.addEventListener("input", updateSendBtn);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
