<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HelloCity — Miami Insider Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FFB800;
      --black: #000000;
      --white: #FFFFFF;
      --bg: #F2F2F2;
      --border: #E0E0E0;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--black);
    }
    #app {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      background: var(--white);
    }

    /* ── Header ── */
    header {
      background: var(--yellow);
      padding: 16px 18px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-dot {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--black);
      flex-shrink: 0;
    }
    .header-title {
      font-weight: 800; font-size: 20px;
      color: var(--black); letter-spacing: -0.3px;
    }
    .progress-dots { margin-left: auto; display: flex; gap: 6px; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: rgba(0,0,0,0.2);
      transition: background 0.3s;
    }
    .dot.filled { background: var(--black); }

    /* ── Progress bar ── */
    .progress-bar { height: 4px; background: rgba(0,0,0,0.1); flex-shrink: 0; background: var(--yellow); }
    .progress-fill {
      height: 100%;
      background: var(--black);
      transition: width 0.5s ease;
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: var(--bg);
    }
    #chat::-webkit-scrollbar { width: 0; }

    .msg-row { display: flex; animation: slideUp 0.2s ease; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 82%;
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.5;
      font-weight: 500;
    }
    .bubble.assistant {
      background: var(--yellow);
      color: var(--black);
      border-radius: 18px 18px 18px 4px;
      font-weight: 600;
    }
    .bubble.user {
      background: var(--white);
      color: var(--black);
      border-radius: 18px 18px 4px 18px;
      border: 1.5px solid var(--border);
      font-weight: 500;
    }

    /* ── Typing indicator ── */
    .typing-row { display: flex; align-items: flex-end; animation: fadeIn 0.2s; }
    .typing-bubble {
      background: var(--yellow);
      border-radius: 18px 18px 18px 4px;
      padding: 14px 18px; display: flex; gap: 5px; align-items: center;
    }
    .dot-pulse {
      width: 7px; height: 7px; border-radius: 50%; background: var(--black);
      animation: pulse 1.2s infinite;
    }
    .dot-pulse:nth-child(2) { animation-delay: 0.2s; }
    .dot-pulse:nth-child(3) { animation-delay: 0.4s; }

    /* ── Venue cards ── */
    .venues-section { animation: slideUp 0.3s ease; }
    .venues-label {
      font-size: 11px; font-weight: 700; color: var(--black);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .venue-card {
      background: var(--white);
      border-radius: 14px;
      padding: 13px 15px;
      margin-bottom: 9px;
      box-shadow: var(--shadow);
      border-left: 4px solid var(--yellow);
      animation: slideUp 0.3s ease both;
    }
    .venue-img {
      width: 100%; height: 140px; object-fit: cover;
      border-radius: 10px; margin-bottom: 10px;
      display: block;
    }
    .venue-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    .venue-name {
      font-weight: 800; font-size: 15px;
      color: var(--black); flex: 1;
    }
    .venue-vibe {
      font-size: 10px; font-weight: 700; color: var(--black);
      background: var(--yellow); border-radius: 20px;
      padding: 2px 8px; white-space: nowrap; margin-left: 8px; flex-shrink: 0;
    }
    .venue-meta { font-size: 11px; color: #666; font-weight: 500; margin-bottom: 5px; }
    .venue-desc { font-size: 13px; color: #444; line-height: 1.5; }

    /* ── Action buttons ── */
    .action-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn-yes {
      flex: 1; padding: 14px;
      background: var(--yellow);
      color: var(--black); border: none; border-radius: 14px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn-yes:active { transform: scale(0.96); opacity: 0.85; }
    .btn-no {
      padding: 14px 20px;
      background: var(--white); color: #666;
      border: 1.5px solid var(--border); border-radius: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: transform 0.15s;
    }
    .btn-no:active { transform: scale(0.96); }

    /* ── Profile card ── */
    .profile-card {
      background: var(--white); border-radius: 20px; padding: 22px;
      box-shadow: var(--shadow);
      animation: slideUp 0.4s ease;
      border: 2px solid var(--yellow);
    }
    .profile-header { text-align: center; margin-bottom: 18px; }
    .profile-palm { font-size: 38px; margin-bottom: 8px; }
    .profile-title {
      font-weight: 900; font-size: 20px;
      color: var(--black); margin-bottom: 3px;
    }
    .profile-subtitle { font-size: 12px; color: #666; }
    .profile-json {
      background: #F8F8F8; border-radius: 12px; padding: 14px;
      font-family: monospace; font-size: 13px;
      color: #333; line-height: 1.7; white-space: pre-wrap; margin-bottom: 14px;
    }
    .interest-pills { display: flex; gap: 8px; margin-bottom: 16px; }
    .interest-pill {
      flex: 1; background: var(--yellow);
      border-radius: 10px; padding: 9px 6px;
      text-align: center; font-size: 11px; color: var(--black);
      font-weight: 800; line-height: 1.3;
    }
    .btn-restart {
      width: 100%; padding: 14px;
      background: var(--black); color: var(--white);
      border: none; border-radius: 12px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity 0.15s;
    }
    .btn-restart:active { opacity: 0.8; }

    /* ── Input bar ── */
    #input-bar {
      padding: 12px 14px 24px;
      background: var(--black);
      display: flex; gap: 10px; align-items: center;
      flex-shrink: 0;
    }
    .input-wrap {
      flex: 1; background: var(--white); border-radius: 24px;
      padding: 12px 18px; display: flex; align-items: center;
    }
    #msg-input {
      flex: 1; border: none; background: transparent;
      font-size: 15px; outline: none; color: var(--black);
      font-family: 'Inter', sans-serif; font-weight: 500;
    }
    #msg-input::placeholder { color: #aaa; }
    #send-btn {
      width: 52px; height: 52px; border-radius: 50%;
      border: none; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      background: #333; color: #666;
      transition: background 0.2s, transform 0.15s;
      font-family: 'Inter', sans-serif;
    }
    #send-btn.active {
      background: var(--yellow);
      color: var(--black);
    }
    #send-btn:active { transform: scale(0.9); }

    /* ── Animations ── */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.7); }
      50% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-dot"></div>
    <div class="header-title">HelloCity</div>
    <div class="progress-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
  </header>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div id="chat"></div>

  <div id="input-bar">
    <div class="input-wrap">
      <input id="msg-input" type="text" placeholder="Type here..." autocomplete="off" />
    </div>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
  const API_BASE = "https://hellocity-onboarding.onrender.com";

  let sessionId = null;
  let phase = "chat";
  let interestCount = 0;
  let loading = false;

  const chat = document.getElementById("chat");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const progressFill = document.getElementById("progress-fill");

  init();

  async function init() {
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/session`, { method: "POST" });
      const data = await res.json();
      sessionId = data.sessionId;
      updateState(data.state);
      appendMessage("assistant", data.message);
    } catch (e) {
      appendMessage("assistant", "Could not connect to HelloCity. Please try again.");
    }
    setLoading(false);
    input.focus();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading || phase !== "chat") return;
    input.value = "";
    updateSendBtn();
    appendMessage("user", text);
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message: text }),
      });
      const data = await res.json();
      updateState(data.state);
      appendMessage("assistant", data.message);
      if (data.pendingInterest && data.venues) showVenues(data.pendingInterest, data.venues);
    } catch (e) {
      appendMessage("assistant", "Something went wrong. Try again!");
    }
    setLoading(false);
    if (phase === "chat") input.focus();
  }

  async function confirmInterest(confirmed) {
    const venueSection = document.getElementById("venue-section");
    if (venueSection) venueSection.remove();
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, confirmed }),
      });
      const data = await res.json();
      updateState(data.state);
      if (data.state.complete) {
        appendMessage("assistant", data.message);
        showProfile(data.profile);
      } else {
        appendMessage("assistant", data.message);
      }
    } catch (e) {
      appendMessage("assistant", "Something went wrong. Let's keep going!");
    }
    setLoading(false);
    if (phase === "chat") input.focus();
  }

  function appendMessage(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;
    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(bubble);
    chat.appendChild(row);
    scrollChat();
  }

  function showTyping() {
    const row = document.createElement("div");
    row.className = "typing-row";
    row.id = "typing";
    row.innerHTML = `<div class="typing-bubble"><span class="dot-pulse"></span><span class="dot-pulse"></span><span class="dot-pulse"></span></div>`;
    chat.appendChild(row);
    scrollChat();
  }

  function removeTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
  }

  function showVenues(interest, venues) {
    phase = "confirm";
    updateInputState();
    const section = document.createElement("div");
    section.className = "venues-section";
    section.id = "venue-section";
    const label = document.createElement("div");
    label.className = "venues-label";
    label.textContent = `Miami picks for "${interest}"`;
    section.appendChild(label);
    venues.forEach((v, i) => {
      const card = document.createElement("div");
      card.className = "venue-card";
      card.style.animationDelay = `${i * 0.1}s`;
      card.innerHTML = `
        ${v.imageUrl ? `<img src="${v.imageUrl}" alt="${v.name}" class="venue-img" onerror="this.style.display='none'" />` : ""}
        <div class="venue-header">
          <div class="venue-name">${v.emoji} ${v.name}</div>
          <div class="venue-vibe">${v.vibe}</div>
        </div>
        <div class="venue-meta">📍 ${v.neighborhood} · ${v.hours}</div>
        <div class="venue-desc">${v.description}</div>`;
      section.appendChild(card);
    });
    const actions = document.createElement("div");
    actions.className = "action-row";
    actions.innerHTML = `
      <button class="btn-yes" onclick="confirmInterest(true)">✓ Yes, that's what I meant</button>
      <button class="btn-no" onclick="confirmInterest(false)">No</button>`;
    section.appendChild(actions);
    chat.appendChild(section);
    scrollChat();
  }

  function showProfile(profile) {
    phase = "done";
    updateInputState();
    const card = document.createElement("div");
    card.className = "profile-card";
    card.innerHTML = `
      <div class="profile-header">
        <div class="profile-palm">🌴</div>
        <div class="profile-title">Your Miami Profile</div>
        <div class="profile-subtitle">Personalized just for you</div>
      </div>
      <div class="profile-json">${JSON.stringify(profile, null, 2)}</div>
      <div class="interest-pills">
        ${profile.interests.map(i => `<div class="interest-pill">${i}</div>`).join("")}
      </div>
      <button class="btn-restart" onclick="restart()">Start Over</button>`;
    chat.appendChild(card);
    scrollChat();
    document.getElementById("input-bar").style.display = "none";
  }

  function updateState(state) {
    if (!state) return;
    interestCount = state.interestCount;
    if (state.phase) phase = state.phase;
    for (let i = 0; i < 3; i++) {
      document.getElementById(`d${i}`).classList.toggle("filled", i < interestCount);
    }
    progressFill.style.width = `${(interestCount / 3) * 100}%`;
    updateInputState();
  }

  function updateInputState() {
    const disabled = loading || phase !== "chat";
    input.disabled = disabled;
    input.placeholder = phase === "confirm" ? "Tap a button above..." : phase === "done" ? "" : "Type here...";
    updateSendBtn();
  }

  function setLoading(val) {
    loading = val;
    if (val) showTyping(); else removeTyping();
    updateInputState();
  }

  function updateSendBtn() {
    const active = !loading && input.value.trim() && phase === "chat";
    sendBtn.classList.toggle("active", active);
    sendBtn.disabled = !active;
  }

  function scrollChat() {
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
  }

  function restart() { location.reload(); }

  input.addEventListener("input", updateSendBtn);
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
