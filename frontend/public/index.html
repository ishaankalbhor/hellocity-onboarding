<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HelloCity — Miami Insider Onboarding</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet" /> 
  <style>
    /* Your full CSS from the original index.html goes here */
    /* For brevity, I'm assuming you copy-paste your CSS exactly as in your current index.html */
  </style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header>
    <div class="logo-icon">🌴</div>
    <div>
      <div class="logo-text">HelloCity</div>
      <div class="logo-sub">Miami Insider Onboarding</div>
    </div>
    <div class="progress-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>
  </header>

  <!-- Progress bar -->
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Input bar -->
  <div id="input-bar">
    <div class="input-wrap">
      <input id="msg-input" type="text" placeholder="Tell me what you love..." autocomplete="off" />
    </div>
    <button id="send-btn">➤</button>
  </div>
</div>

<script>
  const API_BASE = "https://hellocity-clean.onrender.com"; // <-- make sure this is the new backend

  let sessionId = null;
  let phase = "chat";
  let interestCount = 0;
  let loading = false;

  const chat = document.getElementById("chat");
  const input = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");
  const progressFill = document.getElementById("progress-fill");

  init();

  async function init() {
    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/session`, { method: "POST" });
      const data = await res.json();
      sessionId = data.sessionId;
      updateState(data.state);
      appendMessage("assistant", data.message);
    } catch (e) {
      appendMessage("assistant", "⚠️ Could not connect to HelloCity backend. Make sure the server is running.");
    }
    setLoading(false);
    input.focus();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || loading || phase !== "chat") return;
    input.value = "";
    updateSendBtn();

    appendMessage("user", text);
    setLoading(true);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message: text }),
      });
      const data = await res.json();
      updateState(data.state);
      appendMessage("assistant", data.message);

      if (data.pendingInterest && data.venues) {
        showVenues(data.pendingInterest, data.venues);
      }
    } catch (e) {
      appendMessage("assistant", "Hmm, something went wrong. Try again!");
    }

    setLoading(false);
    if (phase === "chat") input.focus();
  }

  async function confirmInterest(confirmed) {
    const venueSection = document.getElementById("venue-section");
    if (venueSection) venueSection.remove();

    setLoading(true);
    try {
      const res = await fetch(`${API_BASE}/confirm`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, confirmed }),
      });
      const data = await res.json();
      updateState(data.state);

      if (data.state.complete) {
        appendMessage("assistant", data.message);
        showProfile(data.profile);
      } else {
        appendMessage("assistant", data.message);
      }
    } catch (e) {
      appendMessage("assistant", "Something went wrong. Let's keep going!");
    }

    setLoading(false);
    if (phase === "chat") input.focus();
  }

  // ── UI helpers ──
  function appendMessage(role, text) {
    const row = document.createElement("div");
    row.className = `msg-row ${role}`;

    if (role === "assistant") {
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = "🤖";
      row.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;
    bubble.textContent = text;
    row.appendChild(bubble);

    chat.appendChild(row);
    scrollChat();
  }

  function showVenues(interest, venues) {
    phase = "confirm";
    updateInputState();

    const section = document.createElement("div");
    section.className = "venues-section";
    section.id = "venue-section";

    const label = document.createElement("div");
    label.className = "venues-label";
    label.textContent = `✨ Miami picks for "${interest}"`;
    section.appendChild(label);

    venues.forEach((v, i) => {
      const card = document.createElement("div");
      card.className = "venue-card";
      card.style.animationDelay = `${i * 0.1}s`;
      card.innerHTML = `
        <div class="venue-header">
          <div class="venue-name">${v.emoji} ${v.name}</div>
          <div class="venue-vibe">${v.vibe}</div>
        </div>
        <div class="venue-meta">📍 ${v.neighborhood} · ${v.hours}</div>
        <div class="venue-desc">${v.description}</div>`;
      section.appendChild(card);
    });

    const actions = document.createElement("div");
    actions.className = "action-row";
    actions.innerHTML = `
      <button class="btn-yes" onclick="confirmInterest(true)">✓ Yes, that's what I meant</button>
      <button class="btn-no" onclick="confirmInterest(false)">No</button>`;
    section.appendChild(actions);

    chat.appendChild(section);
    scrollChat();
  }

  function showProfile(profile) {
    phase = "done";
    updateInputState();

    const card = document.createElement("div");
    card.className = "profile-card";
    card.innerHTML = `
      <div class="profile-header">
        <div class="profile-palm">🌴</div>
        <div class="profile-title">Your Miami Profile</div>
        <div class="profile-subtitle">Personalized just for you</div>
      </div>
      <div class="profile-json">${JSON.stringify(profile, null, 2)}</div>
      <div class="interest-pills">
        ${profile.interests.map(i => `<div class="interest-pill">${i}</div>`).join("")}
      </div>
      <button class="btn-restart" onclick="restart()">Start Over</button>`;

    chat.appendChild(card);
    scrollChat();

    document.getElementById("input-bar").style.display = "none";
  }

  function updateState(state) {
    if (!state) return;
    interestCount = state.interestCount;
    if (state.phase) phase = state.phase;

    for (let i = 0; i < 3; i++) {
      document.getElementById(`d${i}`).classList.toggle("filled", i < interestCount);
    }
    progressFill.style.width = `${(interestCount / 3) * 100}%`;

    updateInputState();
  }

  function updateInputState() {
    const disabled = loading || phase !== "chat";
    input.disabled = disabled;
    input.placeholder = phase === "confirm"
      ? "Tap a button above..."
      : phase === "done"
      ? ""
      : "Tell me what you love...";
    updateSendBtn();
  }

  function setLoading(val) {
    loading = val;
    updateInputState();
  }

  function updateSendBtn() {
    const active = !loading && input.value.trim() && phase === "chat";
    sendBtn.classList.toggle("active", active);
    sendBtn.disabled = !active;
  }

  function scrollChat() { setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50); }
  function restart() { location.reload(); }

  input.addEventListener("input", updateSendBtn);
  input.addEventListener("keydown", e => { if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage();} });
  sendBtn.addEventListener("click", sendMessage);
</script>
</body>
</html>
